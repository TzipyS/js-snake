<!DOCTYPE html>
<html lang="he">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Highscore table</title>
  <link rel="stylesheet" href="../‏css/scores.css" />
</head>

<body>
  <h2>Highscore table</h2>

  <div id="mainContent">
    <table id="scoreTable" border="1" cellspacing="0" cellpadding="8">
      <thead>
        <tr>
          <th>username</th>
          <th>personal record</th>
          <th>actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- שורות יתווספו כאן דינמית -->
      </tbody>
    </table>
  </div>

  

  <div id="sidebar">
    <button id="playAgainBtn">play again</button>
    <button id="changeUserBtn">replace player</button>
    <div id="winner"></div>
  </div>

  <script src="../js/scorch.js" type="text/javascript"></script>
</body>


</html>
